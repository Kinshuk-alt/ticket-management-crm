<!DOCTYPE html>
<html>
<head>
    <title>User Tickets</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="layout-container">
    <div class="sidebar">
        <div class="logo">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span>CRM User</span>
        </div>
        <button class="btn btn-outline" onclick="window.location='dashboard.html'">Dashboard</button>
        <button class="btn btn-outline" onclick="window.location='tickets.html'">My Tickets</button>
        <button class="btn btn-danger" onclick="logout()" style="margin-top: auto;">Logout</button>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h2>My Tickets</h2>
            <div class="profile">
                <h3 id="welcome"></h3>
            </div>
        </div>

        <div class="section">
            <h3>Open New Ticket</h3>
            <div class="form-group">
                <label>Issue Title</label>
                <input id="title" placeholder="Brief summary of the issue">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Detailed description of the problem" rows="4"></textarea>
            </div>
            
            <div style="display: flex; gap: 16px;">
                <div class="form-group" style="flex: 1;">
                    <label>Priority</label>
                    <select id="priority">
                        <option value="LOW">LOW</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="HIGH">HIGH</option>
                        <option value="CRITICAL">CRITICAL</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Category</label>
                    <select id="category">
                        <option value="Software">Software</option>
                        <option value="Hardware">Hardware</option>
                        <option value="Network">Network</option>
                        <option value="Account">Account</option>
                        <option value="Billing">Billing</option>
                        <option value="Security">Security</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary" onclick="createUserTicket()">Submit Ticket</button>
        </div>

        <div class="section">
            <h3>My Tickets History</h3>
            <div class="table-container">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Assigned Agent</th>
                    </tr>
                    </thead>
                    <tbody id="ticketTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../js/app.js"></script>
<script>
    checkRole("USER");
    showUser();
    loadUserTickets();
</script>
</body>
</html>
