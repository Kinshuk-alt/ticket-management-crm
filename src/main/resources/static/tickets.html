<!DOCTYPE html>
<html>

<head>

    <title>User Tickets</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

<div class="topbar">

    <div class="logo">

        User Ticket Portal

    </div>

    <div class="profile">

        <h3 id="welcome">

        </h3>

    </div>

</div>

<div class="nav">

    <button onclick="
window.location=
'dashboard.html'
">

        Dashboard

    </button>

    <button onclick="
window.location=
'tickets.html'
">

        My Tickets

    </button>

    <button onclick="
logout()
">

        Logout

    </button>

</div>

<div class="section">

    <h2>

        Open New Ticket

    </h2>

    <input
            id="title"
            placeholder="Issue Title">

    <textarea
            id="description"
            placeholder="Describe your issue">

</textarea>

    <select
            id="priority">

        <option value="LOW">
            LOW
        </option>

        <option value="MEDIUM">
            MEDIUM
        </option>

        <option value="HIGH">
            HIGH
        </option>

        <option value="CRITICAL">
            CRITICAL
        </option>

    </select>

    <select
            id="category">

        <option value="Software">
            Software
        </option>

        <option value="Hardware">
            Hardware
        </option>

        <option value="Network">
            Network
        </option>

        <option value="Account">
            Account
        </option>

        <option value="Billing">
            Billing
        </option>

        <option value="Security">
            Security
        </option>

        <option value="Other">
            Other
        </option>

    </select>

    <button
            onclick="createUserTicket()">

        Submit Ticket

    </button>

</div>

<div class="section">

    <h2>

        My Tickets

    </h2>

    <table>

        <thead>

        <tr>

            <th>ID</th>

            <th>Title</th>

            <th>Category</th>

            <th>Priority</th>

            <th>Status</th>

            <th>Assigned Agent</th>

        </tr>

        </thead>

        <tbody
                id="ticketTable">

        </tbody>

    </table>

</div>

<script src="../js/app.js"></script>

<script>

    checkRole(
    "USER"
    );

    showUser();

    loadUserTickets();

</script>

</body>

</html>
