<!DOCTYPE html>
<html>

<head>

    <title>Register User</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="box">

    <h1>Create Account</h1>

    <input
            id="name"
            placeholder="Full Name">

    <input
            id="email"
            placeholder="Email">

    <input
            id="password"
            type="password"
            placeholder="Password">

    <select id="role">

        <option value="USER">
            USER
        </option>

        <option value="AGENT">
            AGENT
        </option>

    </select>

    <button
            onclick="registerUser()">

        Register

    </button>

    <br><br>

    <button
            onclick="
window.location=
'index.html'
">

        Go Home

    </button>

</div>

<script>

    async function registerUser(){

    const user={

    name:
    document.getElementById(
    "name"
    ).value,

    email:
    document.getElementById(
    "email"
    ).value,

    password:
    document.getElementById(
    "password"
    ).value,

    role:
    document.getElementById(
    "role"
    ).value

    };

    const response=

    await fetch(
    "/api/users/register",
    {

    method:"POST",

    headers:{
    "Content-Type":
    "application/json"
    },

    body:
    JSON.stringify(
    user
    )

    }

    );

    if(
    response.ok
    ){

    alert(
    "User Registered Successfully"
    );

    window.location=
    "index.html";

    }

    else{

    alert(
    "Registration Failed"
    );

    }

    }

</script>

</body>

</html>
