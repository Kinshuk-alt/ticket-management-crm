<!DOCTYPE html>
<html>
<head>
    <title>Register User</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="box-wrapper">
    <div class="box">
        <h1>Create Account</h1>
        <p>Join the CRM portal</p>
        
        <div class="form-group">
            <label for="name">Full Name</label>
            <input id="name" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role">
                <option value="USER">USER</option>
                <option value="AGENT">AGENT</option>
            </select>
        </div>
        <div class="form-group">
            <label for="specialization">Specialization (Agent only)</label>
            <select id="specialization">
                <option value="">No Specialization</option>
                <option value="Software">Software</option>
                <option value="Hardware">Hardware</option>
                <option value="Network">Network</option>
                <option value="Security">Security</option>
            </select>
        </div>
        
        <button class="btn btn-primary btn-block" onclick="registerUser()">Register</button>
        <button class="btn btn-outline btn-block" onclick="window.location='index.html'">Cancel</button>
    </div>
</div>

<script>
    async function registerUser(){
        const user={
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value,
            specialization: document.getElementById("specialization").value
        };

        const response = await fetch("/api/users/register", {
            method:"POST",
            headers:{
                "Content-Type": "application/json"
            },
            body: JSON.stringify(user)
        });

        if(response.ok){
            alert("User Registered Successfully");
            window.location="index.html";
        } else{
            alert("Registration Failed");
        }
    }
</script>
</body>
</html>
