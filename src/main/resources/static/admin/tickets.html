<!DOCTYPE html>
<html>

<head>

    <title>Manage Tickets</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

<div class="topbar">

    <div class="logo">

        Admin Ticket Manager

    </div>

    <div class="profile">

        <h3 id="welcome">

        </h3>

    </div>

</div>

<div class="nav">

    <button onclick="
window.location=
'dashboard.html'
">

        Dashboard

    </button>

    <button onclick="
window.location=
'reports.html'
">

        Reports

    </button>

    <button onclick="
logout()
">

        Logout

    </button>

</div>

<div class="section">

    <h2>Assign Ticket</h2>

    <input
            id="ticketId"
            placeholder="Ticket ID">

    <input
            id="agentId"
            placeholder="Agent ID">

    <button
            onclick="assignTicket()">

        Assign Agent

    </button>

</div>

<div class="section">

    <h2>Update Status</h2>

    <input
            id="statusTicketId"
            placeholder="Ticket ID">

    <select id="status">

        <option value="">
            Select Status
        </option>

        <option value="OPEN">
            OPEN
        </option>

        <option value="IN_PROGRESS">
            IN_PROGRESS
        </option>

        <option value="RESOLVED">
            RESOLVED
        </option>

    </select>

    <button
            onclick="updateStatus()">

        Update

    </button>

</div>

<div class="section">

    <h2>Search Tickets</h2>

    <input
            id="searchTicket"
            placeholder="Search Title">

    <button
            onclick="searchTickets()">

        Search

    </button>

</div>

<div class="section">

    <h2>All Tickets</h2>

    <table>

        <thead>

        <tr>

            <th>ID</th>

            <th>Title</th>

            <th>Priority</th>

            <th>Status</th>

            <th>Assigned</th>

        </tr>

        </thead>

        <tbody id="ticketTable">

        </tbody>

    </table>

</div>

<script src="../js/app.js"></script>

<script>

    checkRole(
    "ADMIN"
    );

    showUser();

    loadTickets();

</script>

</body>

</html>
