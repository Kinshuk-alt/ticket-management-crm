<!DOCTYPE html>
<html>
<head>
    <title>Manage Tickets</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="layout-container">
    <div class="sidebar">
        <div class="logo">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span>CRM Admin</span>
        </div>
        <button class="btn btn-outline" onclick="window.location='dashboard.html'">Dashboard</button>
        <button class="btn btn-outline" onclick="window.location='tickets.html'">Manage Tickets</button>
        <button class="btn btn-outline" onclick="window.location='reports.html'">Reports</button>
        <button class="btn btn-danger" onclick="logout()" style="margin-top: auto;">Logout</button>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h2>Ticket Manager</h2>
            <div class="profile">
                <h3 id="welcome"></h3>
            </div>
        </div>

        <div style="display: flex; gap: 24px;">
            <div class="section" style="flex: 1;">
                <h3>Assign Ticket</h3>
                <div class="form-group">
                    <label>Ticket ID</label>
                    <input id="ticketId" placeholder="ID">
                </div>
                <div class="form-group">
                    <label>Agent ID</label>
                    <input id="agentId" placeholder="Agent ID">
                </div>
                <button class="btn btn-primary" onclick="assignTicket()">Assign Agent</button>
            </div>

            <div class="section" style="flex: 1;">
                <h3>Update Status</h3>
                <div class="form-group">
                    <label>Ticket ID</label>
                    <input id="statusTicketId" placeholder="ID">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="">Select Status</option>
                        <option value="OPEN">OPEN</option>
                        <option value="IN_PROGRESS">IN_PROGRESS</option>
                        <option value="RESOLVED">RESOLVED</option>
                    </select>
                </div>
                <button class="btn btn-warning" onclick="updateStatus()">Update</button>
            </div>
        </div>

        <div class="section">
            <h3>All Tickets</h3>
            <div class="form-group" style="display: flex; gap: 16px; margin-bottom: 24px;">
                <input id="searchTicket" placeholder="Search Title..." style="margin-bottom: 0;">
                <button class="btn btn-outline" onclick="searchTickets()">Search</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Assigned</th>
                    </tr>
                    </thead>
                    <tbody id="ticketTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../js/app.js"></script>
<script>
    checkRole("ADMIN");
    showUser();
    loadTickets();
</script>
</body>
</html>
