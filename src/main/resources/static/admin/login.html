<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="box-wrapper">
    <div class="box">
        <h1>Admin Login</h1>
        <p>Sign in to the Admin Portal</p>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••">
        </div>
        
        <button class="btn btn-primary btn-block" onclick="login('ADMIN')">Login</button>
        <button class="btn btn-outline btn-block" onclick="window.location='../index.html'">Back to Home</button>
    </div>
</div>
<script src="../js/app.js"></script>
</body>
</html>
